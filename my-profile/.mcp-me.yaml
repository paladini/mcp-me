# mcp-me Configuration
# This file configures how mcp-me generates and serves your profile.
# Profile data (identity.yaml, skills.yaml, etc.) lives alongside this file.
#
# Docs: https://github.com/paladini/mcp-me

# ─── Generators ──────────────────────────────────────────────────────────────
# Data sources for `mcp-me generate`. Uncomment the ones you want.
# Run: mcp-me generate .   (reads this file automatically, no flags needed)
generators:
  # Code
  github: paladini
  # gitlab: your-username
  # bitbucket: your-username
  # codeberg: your-username
  # kaggle: your-username

  # Writing
  # devto: your-username
  medium: fernandopaladini
  # hashnode: your-username
  # substack: your-newsletter
  # wordpress: your-site.wordpress.com

  # Community
  # stackoverflow: 12345
  # hackernews: your-username
  # mastodon: user@mastodon.social
  # bluesky: handle.bsky.social
  # reddit: your-username
  # producthunt: your-username
  # threads: your-username

  # Activity
  # lastfm: your-username
  # steam: your-steam-id
  # letterboxd: your-username
  goodreads: your-user-id
  # anilist: your-username
  # duolingo: your-username
  strava: 98538784

  # Identity
  gravatar: fnpaladini@gmail.com
  # keybase: your-username
  # mbti: INTJ
  # pronouns: they/them
  timezone: America/Sao_Paulo

# ─── Plugins ─────────────────────────────────────────────────────────────────
# Live data integrations for `mcp-me serve`. These provide real-time MCP
# resources and tools to AI assistants.
plugins:
  # github:
  #   enabled: true
  #   username: your-username
  #   token_env: GITHUB_TOKEN

  # spotify:
  #   enabled: true
  #   client_id_env: SPOTIFY_CLIENT_ID
  #   client_secret_env: SPOTIFY_CLIENT_SECRET
  #   refresh_token_env: SPOTIFY_REFRESH_TOKEN

  # bluesky:
  #   enabled: true
  #   handle: handle.bsky.social

  # lastfm:
  #   enabled: true
  #   username: your-username
  #   api_key_env: LASTFM_API_KEY
