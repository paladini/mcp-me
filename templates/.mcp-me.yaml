# ═══════════════════════════════════════════════════════════════════════════════
# PLUGINS — Live data integrations for `mcp-me serve`
# These provide real-time MCP resources and tools to AI assistants.
# ═══════════════════════════════════════════════════════════════════════════════
plugins:

  # github:
  #   enabled: true
  #   username: your-username
  #   token_env: GITHUB_TOKEN               # optional: higher rate limits
  #   include_forks: false
  #   max_repos: 30

  # spotify:
  #   enabled: true
  #   client_id_env: SPOTIFY_CLIENT_ID
  #   client_secret_env: SPOTIFY_CLIENT_SECRET
  #   refresh_token_env: SPOTIFY_REFRESH_TOKEN
  #   time_range: medium_term               # short_term | medium_term | long_term

  # linkedin:
  #   enabled: true
  #   data_path: /path/to/linkedin-export.json

  # wakatime:
  #   enabled: true
  #   username: your-username
  #   api_key_env: WAKATIME_API_KEY         # optional: for private profiles

  # devto:
  #   enabled: true
  #   username: your-username
  #   api_key_env: DEVTO_API_KEY            # optional: higher rate limits

  # bluesky:
  #   enabled: true
  #   handle: handle.bsky.social

  # hackernews:
  #   enabled: true
  #   username: your-username

  # reddit:
  #   enabled: true
  #   username: your-username

  # gitlab:
  #   enabled: true
  #   username: your-username
  #   instance_url: https://gitlab.com      # or your self-hosted GitLab
  #   token_env: GITLAB_TOKEN               # optional: for private data
  #   max_projects: 30

  # mastodon:
  #   enabled: true
  #   handle: user@mastodon.social

  # youtube:
  #   enabled: true
  #   channel_id: UCxxxxxxx
  #   api_key_env: YOUTUBE_API_KEY          # optional: for full channel stats

  # lastfm:
  #   enabled: true
  #   username: your-username
  #   api_key_env: LASTFM_API_KEY           # optional: for full scrobble data

  # steam:
  #   enabled: true
  #   steam_id: your-steam64-id
  #   api_key_env: STEAM_API_KEY            # optional: for game library
